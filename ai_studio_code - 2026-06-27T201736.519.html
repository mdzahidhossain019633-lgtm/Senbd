<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senbd Live - Login & Registration</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }
        
        .card { background: rgba(255, 255, 255, 0.07); backdrop-filter: blur(15px); padding: 30px; border-radius: 20px; width: 90%; max-width: 380px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.6); text-align: center; }
        
        .brand { font-size: 30px; font-weight: 800; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 10px; color: #fff; text-transform: uppercase; }
        .live-badge { background-color: #ff0000; color: white; padding: 2px 10px; border-radius: 5px; font-size: 12px; animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .input-box { margin-bottom: 15px; }
        .input-box input { width: 100%; padding: 14px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px; outline: none; color: white; text-align: center; font-size: 14px; transition: 0.3s; }
        .input-box input:focus { border-color: #ff0000; background: rgba(255, 255, 255, 0.15); }

        .btn { width: 100%; padding: 14px; background: linear-gradient(45deg, #ff0000, #b30000); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4); }

        .footer { margin-top: 20px; font-size: 13px; color: #aaa; }
        .footer span { color: #ff4d4d; cursor: pointer; font-weight: bold; }

        #empty-screen { display: none; font-size: 22px; color: #888; font-weight: bold; }
        .error-msg { color: #ff4d4d; font-size: 12px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="card" id="main-card">
        <div class="brand">Senbd <span class="live-badge">Live</span></div>

        <!-- সাইন ইন ফর্ম -->
        <div id="login-section">
            <h2 style="margin-bottom: 20px; font-size: 18px;">সাইন ইন করুন</h2>
            <p id="login-error" class="error-msg">ভুল তথ্য অথবা অ্যাকাউন্ট নেই!</p>
            <div class="input-box"><input type="email" id="login-email" placeholder="আসলে ইমেইল দিন"></div>
            <div class="input-box"><input type="password" id="login-pass" placeholder="আসল পাসওয়ার্ড দিন"></div>
            <button class="btn" onclick="handleLogin()">সাইন ইন</button>
            <div class="footer">অ্যাকাউন্ট নেই? <span onclick="toggleForm('signup')">নতুন তৈরি করুন</span></div>
        </div>

        <!-- রেজিস্ট্রেশন ফর্ম -->
        <div id="signup-section" style="display: none;">
            <h2 style="margin-bottom: 20px; font-size: 18px;">নতুন অ্যাকাউন্ট তৈরি করুন</h2>
            <div class="input-box"><input type="text" id="reg-name" placeholder="আপনার আসল নাম দিন"></div>
            <div class="input-box"><input type="email" id="reg-email" placeholder="আসল ইমেইল দিন"></div>
            <div class="input-box"><input type="password" id="reg-pass" placeholder="আসল পাসওয়ার্ড দিন"></div>
            <div class="input-box"><input type="tel" id="reg-phone" placeholder="আসল ফোন নাম্বার দিন"></div>
            <button class="btn" onclick="handleSignup()">রেজিস্ট্রেশন করুন</button>
            <div class="footer">ইতিমধ্যে অ্যাকাউন্ট আছে? <span onclick="toggleForm('login')">সাইন ইন করুন</span></div>
        </div>

        <!-- সফল মেসেজ -->
        <div id="empty-screen">কোনো কিছু পাওয়া যায়নি</div>
    </div>

    <script>
        function toggleForm(type) {
            document.getElementById('login-section').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('signup-section').style.display = type === 'signup' ? 'block' : 'none';
            document.getElementById('login-error').style.display = 'none';
        }

        function handleSignup() {
            let users = JSON.parse(localStorage.getItem('senbd_users')) || [];
            let name = document.getElementById('reg-name').value;
            let email = document.getElementById('reg-email').value;
            let pass = document.getElementById('reg-pass').value;
            let phone = document.getElementById('reg-phone').value;

            if(name && email && pass && phone) {
                users.push({ name, email, pass, phone });
                localStorage.setItem('senbd_users', JSON.stringify(users));
                alert('রেজিস্ট্রেশন সফল! এখন লগইন করুন।');
                toggleForm('login');
            } else {
                alert('সবগুলো বক্স পূরণ করুন!');
            }
        }

        function handleLogin() {
            let users = JSON.parse(localStorage.getItem('senbd_users')) || [];
            let email = document.getElementById('login-email').value;
            let pass = document.getElementById('login-pass').value;

            // ইউজার ডাটাবেজে আছে কি না চেক করা
            let foundUser = users.find(u => u.email === email && u.pass === pass);

            if (foundUser) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('signup-section').style.display = 'none';
                document.getElementById('empty-screen').style.display = 'block';
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }
    </script>
</body>
</html>
