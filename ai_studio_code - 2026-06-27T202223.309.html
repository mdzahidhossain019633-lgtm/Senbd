<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senbd Live - Admin Dashboard</title>
    <style>
        /* মূল স্টাইল - স্ক্রিনশট অনুযায়ী */
        :root {
            --bg-color: #0f1016;
            --sidebar-bg: #161823;
            --active-gradient: linear-gradient(90deg, #ff0000 0%, #451010 100%);
            --text-color: #ffffff;
            --text-dim: #a0a0a0;
            --red: #ff0000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* সাইডবার ডিজাইন */
        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-section {
            padding: 0 25px 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .live-badge {
            background-color: var(--red);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 18px;
            transition: 0.3s;
            margin: 5px 15px;
            border-radius: 12px;
            text-decoration: none;
        }

        .nav-item:hover {
            color: #fff;
        }

        /* স্ক্রিনশটের মতো অ্যাক্টিভ মেনু স্টাইল */
        .nav-item.active {
            background: var(--active-gradient);
            color: #fff;
            border-left: 4px solid var(--red);
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2);
        }

        .nav-item i {
            font-size: 20px;
        }

        .logout-section {
            padding: 20px 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* মেইন কন্টেন্ট এরিয়া */
        .main-content {
            flex: 1;
            padding: 25px;
            overflow-y: auto;
            background-color: var(--bg-color);
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        /* ডাটা টেবিল ডিজাইন */
        .data-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--text-dim);
            padding: 15px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 15px;
            font-size: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* মোবাইল রেসপনসিভ */
        @media (max-width: 768px) {
            .sidebar {
                width: 80px;
            }
            .brand-name, .nav-text, .logout-text {
                display: none;
            }
            .brand-section {
                padding: 0 0 40px;
                justify-content: center;
            }
            .nav-item {
                justify-content: center;
                padding: 15px 0;
            }
        }
    </style>
</head>
<body>

    <!-- সাইডবার (স্ক্রিনশটের মতো) -->
    <aside class="sidebar">
        <div class="brand-section">
            <span class="brand-name">SENBD</span>
            <span class="live-badge">LIVE</span>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item active">
                <i>📊</i> <span class="nav-text">ড্যাশবোর্ড</span>
            </a>
            <a href="#" class="nav-item">
                <i>👥</i> <span class="nav-text">ইউজার লিস্ট</span>
            </a>
        </nav>

        <div class="logout-section">
            <a href="index.html" class="nav-item" style="margin: 0; padding: 10px 0;">
                <i>🚪</i> <span class="logout-text">লগ আউট</span>
            </a>
        </div>
    </aside>

    <!-- মূল কন্টেন্ট এরিয়া -->
    <main class="main-content">
        <div class="header">
            <h1>ইউজার ম্যানেজমেন্ট</h1>
        </div>

        <div class="data-card">
            <table>
                <thead>
                    <tr>
                        <th>আসল নাম</th>
                        <th>আসল ইমেইল</th>
                        <th>আসল পাসওয়ার্ড</th>
                        <th>আসল ফোন নাম্বার</th>
                    </tr>
                </thead>
                <tbody id="user-display-table">
                    <!-- এখানে ইউজার অ্যাপ থেকে আসা ডাটা দেখাবে -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // ইউজার অ্যাপ (LocalStorage) থেকে ডাটা লোড করা
        function fetchUserData() {
            const users = JSON.parse(localStorage.getItem('senbd_users')) || [];
            const tableBody = document.getElementById('user-display-table');
            tableBody.innerHTML = '';

            if (users.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#888;">কোনো ইউজার তথ্য পাওয়া যায়নি</td></tr>';
                return;
            }

            users.reverse().forEach(user => {
                const row = `
                    <tr>
                        <td>${user.name || 'N/A'}</td>
                        <td>${user.email}</td>
                        <td>${user.pass}</td>
                        <td style="color: #fff; font-weight: bold;">${user.phone || 'N/A'}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // পেজ লোড হলে ডাটা দেখাবে
        window.onload = fetchUserData;
    </script>

</body>
</html>
